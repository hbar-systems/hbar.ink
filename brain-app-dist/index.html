<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hbar.ink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=0.6.0">
</head>
<body class="t-writers-room s-m">
  <header class="ink-header">
    <div class="ink-row">
      <div class="ink-brand-block">
        <div class="ink-brand">
          <span class="ink-glyph">ℏ</span>
          <span class="ink-name">hbar.ink</span>
        </div>
        <span class="ink-tagline">a single-user thought-drop instrument</span>
      </div>
      <div class="ink-meta">
        <div class="ink-pickers">
          <div class="ink-picker" role="group" aria-label="theme">
            <button data-theme="t-writers-room" title="Writer's Room">W</button>
            <button data-theme="t-night-ink" title="Night Ink">N</button>
            <button data-theme="t-academia" title="Academia">A</button>
          </div>
          <div class="ink-picker" role="group" aria-label="font size">
            <button data-size="s-s" title="small">S</button>
            <button data-size="s-m" title="medium">M</button>
            <button data-size="s-l" title="large">L</button>
          </div>
        </div>
        <button class="ink-focus" id="focus-toggle" title="focus mode (esc to exit)">focus</button>
        <button class="ink-info" id="info-toggle" title="what is this?">?</button>
        <span id="counter" class="ink-counter">0 today</span>
        <span id="bf-meta" class="ink-bf"></span>
      </div>
    </div>
    <div class="ink-info-panel" id="info-panel" hidden>
      hbar.ink is a single-user thought-drop instrument.
      type a thought, hit <b>drop</b>, and it routes into your brain's
      episodic memory — the brain remembers, you can ask it later in chat.
      part of <a href="https://hbar.systems" target="_blank" rel="noopener noreferrer">hbar.systems</a>.
    </div>
  </header>

  <main class="ink-main">
    <section class="ink-section ink-instrument">
      <textarea
        id="drop-input"
        placeholder="a thought."
        autofocus
        spellcheck="false"
        rows="6"
      ></textarea>
      <div class="ink-instrument-row">
        <input
          id="destination"
          type="text"
          placeholder="to: hbar.brain/episodic/  (optional)"
          autocomplete="off"
          spellcheck="false"
        />
        <span id="status" class="ink-status"></span>
        <button id="drop-btn" class="ink-drop-btn" type="button">drop</button>
      </div>
      <div class="ink-presets" id="presets">
        <span class="preset-label">to:</span>
        <button class="preset" data-dest="hbar.brain/episodic/">brain/ep</button>
        <button class="preset" data-dest="hbar.brain/semantic/">brain/sem</button>
        <button class="preset" data-dest="hbar.psychology/">psychology</button>
        <button class="preset" data-dest="hbar.work/">work</button>
        <button class="preset" data-dest="hbar.science/">science</button>
        <button class="preset" data-dest="hbar.systems/">systems</button>
        <span class="preset-sep">·</span>
        <span class="preset-label">kind:</span>
        <button class="preset preset-kind" data-kind="note">note</button>
        <button class="preset preset-kind" data-kind="essay">essay</button>
        <button class="preset preset-kind" data-kind="plan">plan</button>
        <button class="preset preset-kind" data-kind="log">log</button>
        <button class="preset preset-kind" data-kind="prompt">prompt</button>
      </div>
    </section>

    <section class="ink-section ink-drops" aria-label="recent drops">
      <ul id="drops" class="ink-list"></ul>
    </section>
  </main>

  <script src="./main.js?v=0.6.0"></script>
</body>
</html>
