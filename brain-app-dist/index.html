<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hbar.ink</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header id="bf-meta" hidden></header>
    <textarea
      id="drop-input"
      placeholder="Drop a thought. Cmd+Enter to seal it."
      autofocus
      spellcheck="false"
    ></textarea>
    <div id="status" aria-live="polite"></div>
    <section id="drops" aria-label="Recent drops"></section>
  </main>
  <script src="./main.js"></script>
</body>
</html>
